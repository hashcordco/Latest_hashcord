{% load static %}
<section id="results" class="py-100 position-relative overflow-hidden">
    <div class="grid-overlay" style="opacity: 0.2;"></div>
    <div class="glow-orb" style="width: 600px; height: 600px; background: radial-gradient(circle, rgba(76, 81, 191, 0.1), transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>

    <div class="container position-relative" style="z-index: 10;">
        <div class="results-container glass-card p-5">
            <div class="row g-4 text-center align-items-center">
                
                <div class="col-6 col-lg-3" data-aos="fade-up">
                    <div class="result-item">
                        <div class="metric-label">PROJECTS</div>
                        <h2 class="display-4 fw-bold text-white counter">50<span class="text-primary-glow">+</span></h2>
                        <div class="metric-line"></div>
                    </div>
                </div>

                <div class="col-6 col-lg-3" data-aos="fade-up" data-aos-delay="100">
                    <div class="result-item">
                        <div class="metric-label">RETENTION</div>
                        <h2 class="display-4 fw-bold text-white counter">99<span class="text-primary-glow">%</span></h2>
                        <div class="metric-line"></div>
                    </div>
                </div>

                <div class="col-6 col-lg-3" data-aos="fade-up" data-aos-delay="200">
                    <div class="result-item">
                        <div class="metric-label">UPTIME</div>
                        <h2 class="display-4 fw-bold text-white counter">24/7</h2>
                        <div class="metric-line"></div>
                    </div>
                </div>

                <div class="col-6 col-lg-3" data-aos="fade-up" data-aos-delay="300">
                    <div class="result-item">
                        <div class="metric-label">AVG RATING</div>
                        <h2 class="display-4 fw-bold text-white counter">4.9</h2>
                        <div class="metric-line"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</section>
