{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2VKKSMN5GN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-2VKKSMN5GN');
    </script>


    <title> Hashcord </title>
    
    <link rel="icon" type="image/png" href="{% static 'img/logo.ico' %}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap" rel="stylesheet">
  
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/index.css' %}?v=3.1">
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top nav-custom" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
              <img src="{% static 'img/hashcord.png' %}" alt="Hashcord Logo" id="nav-logo">
            </a>
        
            <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link nav-link-glow" href="#services">SERVICES</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-glow" href="#portfolio">PORTFOLIO</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-glow" href="#process">PROCESS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn-nav-glow ms-lg-3" href="#contact">GET IN TOUCH</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock content %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <script src="{% static 'js/main.js' %}?v=1.4"></script>
    
    <script>
      // Initialize AOS but exclude the hero elements so GSAP can handle them
      AOS.init({ 
        duration: 1000, 
        once: true,
        offset: 100,
        // This ensures AOS doesn't reset opacity on elements GSAP is already controlling
        startEvent: 'DOMContentLoaded' 
      });
    </script>
</body>
</html>
